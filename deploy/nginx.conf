# Nginx configuration for LinkMan with TLS obfuscation
# Place in /etc/nginx/sites-available/linkman, then:
#   ln -s /etc/nginx/sites-available/linkman /etc/nginx/sites-enabled/
#
# IMPORTANT: replace YOUR_DOMAIN with your actual domain,
# then obtain a real cert:
#   sudo certbot --nginx -d YOUR_DOMAIN
#
# To test with a self-signed cert first:
#   sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/ssl/private/linkman-selfsigned.key \
#     -out /etc/ssl/certs/linkman-selfsigned.crt \
#     -subj "/CN=YOUR_DOMAIN"
#
# Then switch the ssl_certificate / ssl_certificate_key lines below.

upstream linkman_backend {
    server 127.0.0.1:8388;
}

upstream linkman_websocket {
    server 127.0.0.1:8390;
}

server {
    listen 80;
    server_name _;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/ssl/certs/linkman-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/linkman-selfsigned.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location /linkman {
        proxy_pass http://linkman_websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8389/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
