[server]
host = "0.0.0.0"
port = 50000
management_port = 50001
max_connections = 1024
connection_timeout = 300
buffer_size = 65536

[client]
local_host = "127.0.0.1"
local_port = 1080
server_host = "127.0.0.1"
server_port = 8388

[crypto]
cipher = "aes-256-gcm"
key = "kYQQgzX2KwZwU76tQchHHtwOw6VTdcFACkSuUjIyFSA"

[traffic]
enabled = true
limit_mb = 0
warning_threshold_mb = 1000
reset_day = 1

[device]
max_devices = 5
session_timeout = 3600
allowed_devices = []

[log]
level = "INFO"
file = "logs/linkman.log"
max_size_mb = 10
backup_count = 5
format = "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {message}"

[tls]
enabled = true
cert_file = ""
key_file = ""
domain = "localhost"
websocket_path = "/linkman"
