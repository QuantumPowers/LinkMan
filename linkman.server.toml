# ============================================================
# LinkMan VPN - Server Configuration
# ============================================================
# This file is automatically copied to /opt/linkman/linkman.toml
# by the deployment script. Do not edit this template directly;
# edit /opt/linkman/linkman.toml on the server.
#
# Deploy via Git/GitHub:
#   git push origin main                                   (your PC)
#   sudo bash /opt/linkman/deploy/install_server.sh --update  (server)
# ============================================================

[server]
host = "0.0.0.0"
port = 8388
management_port = 8389
max_connections = 1024
connection_timeout = 300
buffer_size = 65536

[crypto]
# Encryption algorithm: chacha20-poly1305 (lighter for server) or aes-256-gcm
cipher = "chacha20-poly1305"
# Generate key with: linkman-server --generate-key
# Paste the generated key below:
key = ""
identity = ""

[traffic]
# Traffic accounting and limits (per server)
enabled = true
limit_mb = 0  # 0 = unlimited per client
warning_threshold_mb = 1000
reset_day = 1  # Reset on 1st of each month

[device]
max_devices = 5
session_timeout = 3600
allowed_devices = []

[log]
level = "INFO"
file = "logs/linkman.log"
max_size_mb = 10
backup_count = 5
format = "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {message}"

[tls]
# Enable TLS + WebSocket for traffic obfuscation (behind nginx)
enabled = false
cert_file = ""
key_file = ""
domain = ""
websocket_path = "/linkman"
websocket_enabled = false

# Protocol: only shadowsocks2022 is currently supported
protocol = "shadowsocks2022"
